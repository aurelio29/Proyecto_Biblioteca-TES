<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .profile-card { border-radius: 20px; border: none; overflow: hidden; }
        .profile-header { background: #2c3e50; color: white; padding: 40px; text-align: center; }
        .avatar { font-size: 80px; color: #ecf0f1; }
        .info-label { font-weight: bold; color: #7f8c8d; font-size: 0.85rem; text-transform: uppercase; }
        .info-value { font-size: 1.1rem; color: #2c3e50; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card profile-card shadow-lg">
                <div class="profile-header">
                    <span class="material-icons avatar">account_circle</span>
                    <h3 class="mt-2">{{ user.nombres }} {{ user.apellidos }}</h3>
                    <span class="badge bg-info">Usuario Activo</span>
                </div>
                <div class="card-body p-4">
                    <div class="row">
                        <div class="col-6">
                            <p class="info-label">ID de Usuario</p>
                            <p class="info-value">@{{ user.id_usuario }}</p>
                        </div>
                        <div class="col-6">
                            <p class="info-label">Cédula</p>
                            <p class="info-value">{{ user.cedula }}</p>
                        </div>
                        <div class="col-6">
                            <p class="info-label">Edad</p>
                            <p class="info-value">{{ user.edad }} años</p>
                        </div>
                        <div class="col-6">
                            <p class="info-label">Correo</p>
                            <p class="info-value">{{ user.correo }}</p>
                        </div>
                    </div>
                    <hr>
                    <div class="d-grid gap-2">
                        <a href="/biblioteca" class="btn btn-outline-secondary">Volver al Dashboard</a>
                        <button class="btn btn-primary">Editar Información</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
