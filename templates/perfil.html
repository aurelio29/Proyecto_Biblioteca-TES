<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Cuenta - Biblioteca Virtual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --primary-dark: #2c3e50; }
        body { background-color: #f0f2f5; }
        .profile-card { border-radius: 15px; overflow: hidden; border: none; }
        .avatar-container { position: relative; width: 120px; height: 120px; margin: 0 auto; }
        .avatar-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid white; }
        .btn-edit-photo { position: absolute; bottom: 0; right: 0; background: var(--primary-dark); color: white; border-radius: 50%; padding: 5px; cursor: pointer; }
        .readonly-field { background-color: #e9ecef !important; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <form action="/api/perfil/actualizar/{{ user.id }}" method="POST" enctype="multipart/form-data">
                <div class="card profile-card shadow">
                    <div class="card-header text-white text-center py-4" style="background: var(--primary-dark);">
                        <div class="avatar-container mb-3">
                            {% if user.foto %}
                                <img src="/static/profile_pics/{{ user.foto }}" class="avatar-img" id="preview">
                            {% else %}
                                <img src="https://ui-avatars.com/api/?name={{ user.nombres }}+{{ user.apellidos }}&background=random" class="avatar-img" id="preview">
                            {% endif %}
                            <label for="inputFoto" class="btn-edit-photo shadow">
                                <span class="material-icons" style="font-size: 20px;">photo_camera</span>
                            </label>
                            <input type="file" id="inputFoto" name="foto" hidden accept="image/*" onchange="previewImage(event)">
                        </div>
                        <h4 class="mb-0">{{ user.nombres }} {{ user.apellidos }}</h4>
                        <span class="badge bg-light text-dark mt-2">{{ user.rol | upper }}</span>
                    </div>

                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4 border-bottom pb-2">Datos Personales</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">ID de Usuario (Bloqueado)</label>
                                <input type="text" class="form-control readonly-field" value="{{ user.id_usuario }}" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Número de Cédula</label>
                                <input type="text" class="form-control readonly-field" value="{{ user.cedula }}" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nombres</label>
                                <input type="text" name="nombres" class="form-control" value="{{ user.nombres }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Apellidos</label>
                                <input type="text" name="apellidos" class="form-control" value="{{ user.apellidos }}" required>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-bold">Correo Electrónico</label>
                                <input type="email" name="correo" class="form-control" value="{{ user.correo }}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Edad</label>
                                <input type="number" name="edad" class="form-control" value="{{ user.edad }}">
                            </div>
                        </div>

                        <div class="mt-5 d-flex justify-content-between">
                            <a href="/dashboard" class="btn btn-outline-secondary d-flex align-items-center gap-2">
                                <span class="material-icons">arrow_back</span> Regresar
                            </a>
                            <button type="submit" class="btn btn-primary px-5 d-flex align-items-center gap-2">
                                <span class="material-icons">save</span> Guardar y Editar
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const output = document.getElementById('preview');
            output.src = reader.result;
        }
        reader.readAsDataURL(event.target.files[0]);
    }
</script>

</body>
</html>
