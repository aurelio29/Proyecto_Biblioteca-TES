<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Biblioteca Virtual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --primary-tes: #2c3e50; }
        .navbar-tes { background-color: var(--primary-tes); color: white; }
        .badge-admin { background-color: #e74c3c; color: white; }
        .badge-docente { background-color: #3498db; color: white; }
        .badge-usuario { background-color: #27ae60; color: white; }
        .modal-header { background-color: var(--primary-tes); color: white; }
        .table-responsive { border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body class="bg-light">

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="navbar navbar-expand-lg navbar-tes shadow-sm mb-4">
        <div class="container">
            <a class="nav-link text-white d-flex align-items-center" href="/dashboard">
                <span class="material-icons me-2">arrow_back</span> PANEL ADMIN
            </a>
            <span class="navbar-brand ms-3 fw-bold">SISTEMA DE GESTIÓN DE USUARIOS</span>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm border-0 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0 text-dark">Listado de Usuarios</h4>
                <button class="btn btn-primary d-flex align-items-center gap-2 shadow-sm" onclick="abrirModalCrear()">
                    <span class="material-icons">person_add</span> Nuevo Usuario
                </button>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Usuario ID</th>
                            <th>Nombre Completo</th>
                            <th>Cédula</th>
                            <th>Correo</th>
                            <th>Rol</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaUsuarios">
                        <!-- Carga dinámica -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL PARA CREAR Y EDITAR USUARIO -->
    <div class="modal fade" id="modalUsuario" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="tituloModal">Usuario</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="userId">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">NOMBRES</label>
                            <input type="text" id="userNombres" class="form-control" placeholder="Ej: Carlos">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">APELLIDOS</label>
                            <input type="text" id="userApellidos" class="form-control" placeholder="Ej: Moreira">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small">CÉDULA DE IDENTIDAD</label>
                        <input type="text" id="userCedula" class="form-control" placeholder="Ingrese 10 dígitos">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small">CORREO ELECTRÓNICO</label>
                        <input type="email" id="userCorreo" class="form-control" placeholder="usuario@tes.edu.ec">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">ID DE ACCESO</label>
                            <input type="text" id="userLogin" class="form-control" placeholder="Nombre de usuario">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">ROL DEL SISTEMA</label>
                            <select id="userRol" class="form-select">
                                <option value="usuario">Estudiante</option>
                                <option value="docente">Docente</option>
                                <option value="admin">Administrador</option>
                            </select>
                        </div>
                    </div>

                    <div id="sectionClave" class="mb-3">
                        <label class="form-label fw-bold small">CONTRASEÑA TEMPORAL</label>
                        <input type="password" id="userClave" class="form-control" placeholder="Asigne una clave inicial">
                        <div class="form-text">Para ediciones, deje en blanco si no desea cambiarla.</div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary px-4" onclick="guardarUsuario()">Guardar Usuario</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const modalUser = new bootstrap.Modal(document.getElementById('modalUsuario'));

        // 1. CARGAR TODOS LOS USUARIOS
        async function cargarUsuarios() {
            try {
                const res = await fetch('/api/admin/usuarios');
                const data = await res.json();
                const tabla = document.getElementById('tablaUsuarios');
                
                tabla.innerHTML = data.map(u => `
                    <tr>
                        <td><code>${u.id_usuario}</code></td>
                        <td>${u.nombres} ${u.apellidos}</td>
                        <td>${u.cedula}</td>
                        <td>${u.correo || '---'}</td>
                        <td><span class="badge badge-${u.rol}">${u.rol.toUpperCase()}</span></td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="editarUser(${u.id})">
                                <span class="material-icons" style="font-size:18px">edit</span>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="eliminarUser(${u.id})">
                                <span class="material-icons" style="font-size:18px">delete</span>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error("Error al cargar usuarios:", e); }
        }

        // 2. ABRIR MODAL PARA CREAR (LIMPIO)
        function abrirModalCrear() {
            document.getElementById('userId').value = "";
            document.getElementById('userNombres').value = "";
            document.getElementById('userApellidos').value = "";
            document.getElementById('userCedula').value = "";
            document.getElementById('userCorreo').value = "";
            document.getElementById('userLogin').value = "";
            document.getElementById('userRol').value = "usuario";
            document.getElementById('userClave').value = "";
            
            document.getElementById('tituloModal').innerText = "Registrar Nuevo Usuario";
            modalUser.show();
        }

        // 3. ABRIR MODAL PARA EDITAR (CON DATOS)
        async function editarUser(id) {
            const res = await fetch(`/api/admin/usuarios/${id}`);
            const u = await res.json();
            
            document.getElementById('userId').value = u.id;
            document.getElementById('userNombres').value = u.nombres;
            document.getElementById('userApellidos').value = u.apellidos;
            document.getElementById('userCedula').value = u.cedula || "";
            document.getElementById('userCorreo').value = u.correo || "";
            document.getElementById('userLogin').value = u.id_usuario;
            document.getElementById('userRol').value = u.rol;
            
            document.getElementById('tituloModal').innerText = "Modificar Usuario";
            modalUser.show();
        }

        // 4. GUARDAR (CREAR O EDITAR)
        async function guardarUsuario() {
            const id = document.getElementById('userId').value;
            const datos = {
                nombres: document.getElementById('userNombres').value,
                apellidos: document.getElementById('userApellidos').value,
                cedula: document.getElementById('userCedula').value,
                correo: document.getElementById('userCorreo').value,
                id_usuario: document.getElementById('userLogin').value,
                rol: document.getElementById('userRol').value,
                contrasena: document.getElementById('userClave').value
            };

            if (!datos.nombres || !datos.id_usuario) {
                alert("Por favor, complete los campos obligatorios.");
                return;
            }

            const metodo = id ? 'PUT' : 'POST';
            const url = id ? `/api/admin/usuarios/${id}` : '/api/usuarios';

            try {
                const res = await fetch(url, {
                    method: metodo,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(datos)
                });

                if (res.ok) {
                    modalUser.hide();
                    cargarUsuarios();
                    alert(id ? "Usuario actualizado correctamente" : "Nuevo usuario registrado");
                } else {
                    alert("Error: El ID de usuario o cédula ya podrían estar registrados.");
                }
            } catch (e) { alert("Error de conexión con el servidor."); }
        }

        // 5. ELIMINAR USUARIO
        async function eliminarUser(id) {
            if (id == 0) {
                alert("No es posible eliminar la cuenta maestra de administración.");
                return;
            }
            if (confirm("¿Está seguro de eliminar esta cuenta permanentemente?")) {
                const res = await fetch(`/api/admin/usuarios/${id}`, { method: 'DELETE' });
                if (res.ok) cargarUsuarios();
                else alert("Error al intentar eliminar el usuario.");
            }
        }

        window.onload = cargarUsuarios;
    </script>
</body>
</html>
