<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Biblioteca Virtual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/libreria.css') }}">
    <style>
        .btn-action { display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 2px; width: 100%; }
        .actions-column { min-width: 200px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top">
        <div class="container">
            <a class="nav-link-inicio" href="/dashboard">
                <span class="material-icons">home</span> INICIO
            </a>
            <div class="dropdown">
                <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" id="dropdownUser" data-bs-toggle="dropdown" aria-expanded="false">
                    <span class="material-icons me-2">account_circle</span>
                    <strong id="nombreUsuario">{{ nombre }}</strong>
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow mt-2">
                    <li><a class="dropdown-item" href="/perfil/{{ usuario_id }}"><span class="material-icons text-secondary me-2">person</span>Mi Perfil</a></li>
                    <li><a class="dropdown-item" href="/logout"><span class="material-icons me-2">logout</span>Cerrar Sesión</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card main-card p-4">
            <h4 class="fw-bold mb-4" style="color: var(--primary-dark);">Gestión de Catálogo</h4>
            
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="filter-label">BUSCAR POR NOMBRE</label>
                    <input type="text" id="buscarNombre" class="form-control" placeholder="Escribe el título..." onkeyup="aplicarFiltros()">
                </div>
                <div class="col-md-4">
                    <label class="filter-label">FILTRAR POR AUTOR</label>
                    <select id="filtroAutor" class="form-select" onchange="aplicarFiltros()"><option value="">Todos los autores</option></select>
                </div>
                <div class="col-md-4">
                    <label class="filter-label">FILTRAR POR GÉNERO</label>
                    <select id="filtroGenero" class="form-select" onchange="aplicarFiltros()"><option value="">Todos los géneros</option></select>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Autor</th>
                            <th>Género</th>
                            <th class="text-center">Año</th>
                            <th class="text-center actions-column">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listaLibros"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Información del Libro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit_id">
                    <div class="mb-3"><label class="form-label">Título</label><input type="text" id="edit_titulo" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Autor</label><input type="text" id="edit_autor" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Género</label><input type="text" id="edit_genero" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Año</label><input type="number" id="edit_anio" class="form-control"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" onclick="actualizarLibro()" class="btn btn-primary">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/api/books';
        let todosLosLibros = [];
        const modalEditar = new bootstrap.Modal(document.getElementById('modalEditar'));

        async function cargarLibros() {
            try {
                const res = await fetch(API_URL);
                todosLosLibros = await res.json();
                renderizarTabla(todosLosLibros);
            } catch (e) { console.error(e); }
        }
// 1. Esta es tu función de la tabla, mantengo tus clases de Bootstrap y estilos
function renderizarTabla(libros) {
    const lista = document.getElementById('listaLibros');
    lista.innerHTML = libros.map(l => `
        <tr>
            <td class="fw-bold">${l.titulo}</td>
            <td>${l.autor}</td>
            <td><span class="badge bg-light text-dark border px-3 py-2">${l.genero}</span></td>
            <td class="text-center">${l.anio}</td>
            <td>
                <div class="columna-acciones">
                    <button onclick="descargarDocumento(${l.id})" class="btn btn-sm btn-outline-success btn-tabla">
                        <span class="material-icons">download</span> Descargar
                    </button>

                    <div class="dropdown">
                        <button class="btn btn-sm btn-outline-secondary dropdown-toggle btn-tabla" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <span class="material-icons" style="font-size:18px">settings</span> Acciones
                        </button>
                        <ul class="dropdown-menu dropdown-menu-acciones shadow">
                            <li>
                                <a class="dropdown-item dropdown-item-accion" href="#" onclick="abrirDocumento('${l.ruta}')">
                                    <span class="material-icons text-info">menu_book</span> Leer Libro
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item dropdown-item-accion" href="#" onclick="abrirModalEditar(${l.id}, '${l.titulo}', '${l.autor}', '${l.genero}', ${l.anio})">
                                    <span class="material-icons text-primary">edit</span> Editar Campos
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item dropdown-item-accion text-danger" href="#" onclick="eliminarLibro(${l.id})">
                                    <span class="material-icons">delete</span> Eliminar
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </td>
        </tr>`).join('');
}

// 2. Estas funciones hacen que el "alert" de prueba se convierta en acciones reales
function descargarDocumento(id) {
    window.location.href = `/api/descargar/${id}`;
}

function abrirDocumento(nombreArchivo) {
    if (nombreArchivo && nombreArchivo !== 'null') {
        // Abre el archivo en una pestaña nueva sin descargar (si es PDF)
        window.open(`/static/uploads/${nombreArchivo}`, '_blank');
    } else {
        alert("No hay un archivo físico vinculado a este registro.");
    }
}
        function abrirModalEditar(id, titulo, autor, genero, anio) {
            document.getElementById('edit_id').value = id;
            document.getElementById('edit_titulo').value = titulo;
            document.getElementById('edit_autor').value = autor;
            document.getElementById('edit_genero').value = genero;
            document.getElementById('edit_anio').value = anio;
            modalEditar.show();
        }

        async function actualizarLibro() {
            const id = document.getElementById('edit_id').value;
            const datos = {
                titulo: document.getElementById('edit_titulo').value,
                autor: document.getElementById('edit_autor').value,
                genero: document.getElementById('edit_genero').value,
                anio: document.getElementById('edit_anio').value
            };

            const res = await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });

            if (res.ok) {
                modalEditar.hide();
                cargarLibros();
                alert("Libro actualizado correctamente");
            }
        }

        async function eliminarLibro(id) {
            if (confirm("¿Estás seguro de que deseas eliminar este libro?")) {
                const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    cargarLibros();
                    alert("Libro eliminado");
                }
            }
        }

        function aplicarFiltros() { /* Tu lógica de filtros se mantiene igual */ }

        window.onload = cargarLibros;
    </script>
</body>
</html>
