<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Biblioteca Virtual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/libreria.css') }}">
    <style>
        .actions-column { min-width: 150px; }
        #visorIframe {
            width: 100%;
            height: calc(100vh - 56px);
            border: none;
        }
        /* Estilo para el botón de favoritos en la nav */
        .btn-favoritos-nav {
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 20px;
            padding: 5px 15px;
            transition: all 0.3s;
        }
        .btn-favoritos-nav:hover {
            background: #e74c3c;
            color: white;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top">
        <div class="container">
            <a class="nav-link-inicio" href="/dashboard">
                <span class="material-icons">home</span> INICIO
            </a>

            <!-- NUEVO: Botón para ir a la vista de Favoritos -->
            <a href="/favoritos" class="btn btn-favoritos-nav d-flex align-items-center me-3 text-decoration-none">
                <span class="material-icons me-1">favorite</span> MIS FAVORITOS
            </a>

            <div class="dropdown">
                <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" id="dropdownUser" data-bs-toggle="dropdown">
                    <span class="material-icons me-2">account_circle</span>
                    <strong id="nombreUsuario">{{ nombre }}</strong>
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow mt-2">
                    <li><a class="dropdown-item" href="/perfil/{{ usuario_id }}"><span class="material-icons text-secondary me-2">person</span>Mi Perfil</a></li>
                    <li><a class="dropdown-item" href="/logout"><span class="material-icons me-2">logout</span>Cerrar Sesión</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card main-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0" style="color: var(--primary-dark);">Gestión de Catálogo</h4>
                {% if rol in ['admin', 'docente'] %}
                <button class="btn btn-primary d-flex align-items-center gap-2" onclick="window.location.href='/mislibros'">
                    <span class="material-icons">upload_file</span> Subir Nuevo Libro
                </button>
                {% endif %}
            </div>
            
            <!-- Filtros Automáticos -->
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="filter-label">BUSCAR POR NOMBRE</label>
                    <input type="text" id="buscarNombre" class="form-control" placeholder="Escribe el título..." onkeyup="aplicarFiltros()">
                </div>
                <div class="col-md-4">
                    <label class="filter-label">FILTRAR POR AUTOR</label>
                    <select id="filtroAutor" class="form-select" onchange="aplicarFiltros()">
                        <option value="">Todos los autores</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="filter-label">FILTRAR POR GÉNERO</label>
                    <select id="filtroGenero" class="form-select" onchange="aplicarFiltros()">
                        <option value="">Todos los géneros</option>
                    </select>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Autor</th>
                            <th>Género</th>
                            <th class="text-center">Año</th>
                            <th class="text-center actions-column">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listaLibros"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL EDITAR DATOS -->
    <div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Información del Libro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit_id">
                    <div class="mb-3"><label class="form-label">Título</label><input type="text" id="edit_titulo" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Autor</label><input type="text" id="edit_autor" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Género</label><input type="text" id="edit_genero" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Año</label><input type="number" id="edit_anio" class="form-control"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" onclick="actualizarLibro()" class="btn btn-primary">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL VISOR DE LIBROS -->
    <div class="modal fade" id="modalVisor" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="tituloLibroVisor">Visualizando Libro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onclick="detenerVisor()"></button>
                </div>
                <div class="modal-body p-0 bg-dark">
                    <iframe id="visorIframe" src=""></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/api/books';
        const ROL_USUARIO = "{{ rol }}";
        const USER_ID = "{{ usuario_id }}"; // Importante para favoritos
        let todosLosLibros = [];
        const modalEditar = new bootstrap.Modal(document.getElementById('modalEditar'));
        const modalVisor = new bootstrap.Modal(document.getElementById('modalVisor'));

        async function cargarLibros() {
            try {
                const res = await fetch(API_URL);
                todosLosLibros = await res.json();
                llenarSelectoresFiltros(todosLosLibros);
                renderizarTabla(todosLosLibros);
            } catch (e) { console.error(e); }
        }

        function llenarSelectoresFiltros(libros) {
            const selectAutor = document.getElementById('filtroAutor');
            const selectGenero = document.getElementById('filtroGenero');
            
            const autores = [...new Set(libros.map(l => l.autor))].sort();
            const generos = [...new Set(libros.map(l => l.genero))].sort();

            autores.forEach(autor => {
                if(autor) selectAutor.innerHTML += `<option value="${autor}">${autor}</option>`;
            });
            generos.forEach(genero => {
                if(genero) selectGenero.innerHTML += `<option value="${genero}">${genero}</option>`;
            });
        }

        function renderizarTabla(libros) {
            const lista = document.getElementById('listaLibros');
            lista.innerHTML = libros.map(l => {
                const esAdmin = ROL_USUARIO === 'admin';
                const esDocente = ROL_USUARIO === 'docente';
                
                return `
                <tr>
                    <td class="fw-bold">${l.titulo}</td>
                    <td>${l.autor}</td>
                    <td><span class="badge bg-light text-dark border px-3 py-2">${l.genero}</span></td>
                    <td class="text-center">${l.anio}</td>
                    <td class="text-center">
                        <div class="dropdown">
                            <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                <span class="material-icons" style="font-size:20px">settings</span>
                            </button>
                            <ul class="dropdown-menu shadow">
                                <li>
                                    <a class="dropdown-item" href="#" onclick="abrirDocumento('${l.ruta}', ${l.id}, '${l.titulo}')">
                                        <span class="material-icons text-info">visibility</span> Visualizar Libro
                                    </a>
                                </li>

                                <!-- NUEVO: Opción Favoritos -->
                                <li>
                                    <a class="dropdown-item" href="#" onclick="marcarFavorito(${l.id})">
                                        <span class="material-icons text-danger">favorite</span> Agregar a Favoritos
                                    </a>
                                </li>

                                ${esAdmin || esDocente ? `
                                <li>
                                    <a class="dropdown-item" href="#" onclick="abrirModalEditar(${l.id}, '${l.titulo}', '${l.autor}', '${l.genero}', ${l.anio})">
                                        <span class="material-icons text-primary">edit</span> Editar Campos
                                    </a>
                                </li>
                                ` : ''}
                                ${esAdmin ? `
                                <li>
                                    <a class="dropdown-item" href="#" onclick="alert('Funcionalidad Deshabilitar')">
                                        <span class="material-icons text-warning">block</span> Deshabilitar
                                    </a>
                                </li>
                                <li><hr class="dropdown-divider"></li>
                                <li>
                                    <a class="dropdown-item text-danger" href="#" onclick="eliminarLibro(${l.id})">
                                        <span class="material-icons">delete</span> Eliminar Libro
                                    </a>
                                </li>
                                ` : ''}
                            </ul>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        // NUEVA FUNCIÓN: Marcar como favorito
        async function marcarFavorito(libroId) {
            try {
                const res = await fetch('/api/favoritos/agregar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        usuario_id: USER_ID, 
                        libro_id: libroId 
                    })
                });
                const data = await res.json();
                alert(data.mensaje);
            } catch (e) {
                alert("Error al procesar la solicitud.");
            }
        }

        function abrirDocumento(nombreArchivo, idLibro, titulo) {
            if (nombreArchivo && nombreArchivo !== 'null') {
                const iframe = document.getElementById('visorIframe');
                const tituloVisor = document.getElementById('tituloLibroVisor');
                tituloVisor.innerText = `Leyendo: ${titulo}`;
                iframe.src = `/api/ver_libro/${idLibro}#toolbar=0&navpanes=0&scrollbar=0`;
                modalVisor.show();
            } else {
                alert("Archivo no disponible.");
            }
        }

        function detenerVisor() {
            document.getElementById('visorIframe').src = "";
        }

        function aplicarFiltros() {
            const busqueda = document.getElementById('buscarNombre').value.toLowerCase();
            const autorSel = document.getElementById('filtroAutor').value;
            const generoSel = document.getElementById('filtroGenero').value;

            const filtrados = todosLosLibros.filter(l => {
                const coincideNombre = l.titulo.toLowerCase().includes(busqueda);
                const coincideAutor = autorSel === "" || l.autor === autorSel;
                const coincideGenero = generoSel === "" || l.genero === generoSel;
                return coincideNombre && coincideAutor && coincideGenero;
            });
            renderizarTabla(filtrados);
        }

        function abrirModalEditar(id, titulo, autor, genero, anio) {
            document.getElementById('edit_id').value = id;
            document.getElementById('edit_titulo').value = titulo;
            document.getElementById('edit_autor').value = autor;
            document.getElementById('edit_genero').value = genero;
            document.getElementById('edit_anio').value = anio;
            modalEditar.show();
        }

        async function actualizarLibro() {
            const id = document.getElementById('edit_id').value;
            const datos = {
                titulo: document.getElementById('edit_titulo').value,
                autor: document.getElementById('edit_autor').value,
                genero: document.getElementById('edit_genero').value,
                anio: document.getElementById('edit_anio').value
            };
            const res = await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });
            if (res.ok) {
                modalEditar.hide();
                location.reload(); 
            }
        }

        async function eliminarLibro(id) {
            if (confirm("¿Eliminar este libro?")) {
                const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (res.ok) cargarLibros();
            }
        }

        window.onload = cargarLibros;
    </script>
</body>
</html>
