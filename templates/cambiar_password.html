<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seguridad - Cambiar Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; }
        .password-card { border-radius: 15px; border: none; }
        .btn-update { background-color: #2c3e50; color: white; border: none; }
        .btn-update:hover { background-color: #1a252f; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card password-card shadow-lg p-4">
                <div class="text-center mb-4">
                    <span class="material-icons text-warning" style="font-size: 48px;">lock_reset</span>
                    <h4 class="fw-bold mt-2">Actualizar Contraseña</h4>
                    <p class="text-muted small">Por seguridad, usa una combinación fuerte.</p>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small">Nueva Contraseña</label>
                    <input type="password" id="nueva_clave" class="form-control" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small">Confirmar Contraseña</label>
                    <input type="password" id="confirmar_clave" class="form-control" placeholder="Repite tu contraseña">
                </div>

                <div class="d-grid gap-2">
                    <button onclick="enviarCambio()" class="btn btn-update py-2 fw-bold">Guardar Cambios</button>
                    <a href="/biblioteca" class="btn btn-light text-muted">Cancelar y volver</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function enviarCambio() {
        const clave = document.getElementById('nueva_clave').value;
        const confirma = document.getElementById('confirmar_clave').value;
        const usuarioId = 1; // Aquí usarías el ID dinámico

        if(clave !== confirma) return alert("Las contraseñas no coinciden");
        if(clave.length < 4) return alert("La contraseña debe ser más larga");

        fetch(`/cambiar_clave/${usuarioId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nueva_contrasena: clave })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.mensaje);
            window.location.href = '/biblioteca';
        });
    }
</script>
</body>
</html>
