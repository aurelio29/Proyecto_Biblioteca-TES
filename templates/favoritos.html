<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Favoritos - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/favoritos.css') }}">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark shadow-sm" style="background-color: #2c3e50;">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center" href="/libreria">
            <span class="material-icons me-2">arrow_back</span> Mis Favoritos
        </a>

        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" id="dropdownUser" data-bs-toggle="dropdown">
                <span class="material-icons me-2">account_circle</span>
                <strong id="nombreUsuario">{{ nombre }}</strong>
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow mt-2">
                <li><a class="dropdown-item" href="/logout"><span class="material-icons me-2">logout</span>Cerrar Sesión</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div id="listaFavoritos" class="row row-cols-1 row-cols-md-3 g-4">
    </div>
</div>

<!-- VISOR DE LIBROS (PANTALLA COMPLETA) -->
<div class="modal fade" id="modalVisor" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white border-0">
                <h5 class="modal-title" id="tituloLibroVisor">Visualizando Libro</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" onclick="detenerVisor()"></button>
            </div>
            <div class="modal-body p-0 bg-dark">
                <iframe id="visorIframe" src=""></iframe>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const USER_ID = "{{ usuario_id }}";
    const modalVisor = new bootstrap.Modal(document.getElementById('modalVisor'));

    async function cargarFavoritos() {
        const res = await fetch(`/api/favoritos/${USER_ID}`);
        const libros = await res.json();
        const contenedor = document.getElementById('listaFavoritos');
        
        if (libros.length === 0) {
            contenedor.innerHTML = `<div class="col-12 text-center mt-5"><h5>No tienes libros favoritos todavía.</h5></div>`;
            return;
        }

        contenedor.innerHTML = libros.map(l => `
            <div class="col">
                <div class="card h-100 card-libro shadow-sm border-0" style="border-radius: 15px;">
                    <div class="card-body text-center">
                        <span class="material-icons text-primary mb-2" style="font-size: 60px;">menu_book</span>
                        <h5 class="card-title fw-bold mt-2">${l.titulo}</h5>
                        <p class="text-muted small">${l.autor}</p>
                        <div class="d-grid gap-2 mt-3">
                            <button onclick="abrirDocumento(${l.id}, '${l.titulo}')" class="btn btn-outline-primary btn-sm d-flex justify-content-center align-items-center gap-2">
                                <span class="material-icons" style="font-size: 16px;">visibility</span> Leer ahora
                            </button>
                            <button onclick="quitarFavorito(${l.id})" class="btn btn-link text-danger btn-sm text-decoration-none d-flex justify-content-center align-items-center gap-1">
                                <span class="material-icons" style="font-size: 16px;">heart_broken</span> Quitar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function abrirDocumento(idLibro, titulo) {
        const iframe = document.getElementById('visorIframe');
        const tituloVisor = document.getElementById('tituloLibroVisor');
        
        tituloVisor.innerText = `Leyendo: ${titulo}`;
        
        iframe.src = `/api/ver_libro/${idLibro}#toolbar=0&navpanes=0&scrollbar=0`;
        
        modalVisor.show();
    }

    function detenerVisor() {
        document.getElementById('visorIframe').src = "";
    }

    async function quitarFavorito(libroId) {
        if(confirm("¿Quitar de tus favoritos?")) {
            await fetch('/api/favoritos/eliminar', {
                method: 'DELETE',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ usuario_id: USER_ID, libro_id: libroId })
            });
            cargarFavoritos();
        }
    }

    window.onload = cargarFavoritos;
</script>
</body>
</html>
